# CI for langfuse-synth-core.
#
# Runner policy: this repo is PUBLIC (consistent with the public kits it is the shared
# DNA of), so GitHub-hosted minutes are free and unlimited. Jobs run on a PINNED hosted
# image (ubuntu-24.04, never the moving `ubuntu-latest`) for reproducibility. These jobs
# touch NO secrets — lint + import smoke only. The portal's "no third-party infra touches
# secrets" directive still binds any FUTURE job that handles secrets or the private
# registry; add such a job on a self-hosted runner, not here.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: python3 -m venv .venv && . .venv/bin/activate && pip install --upgrade pip
      - name: Install (dev)
        run: . .venv/bin/activate && pip install -e '.[dev]'
      - name: Ruff
        run: . .venv/bin/activate && ruff check .

  runtime-smoke:
    # A BARE runtime install must import cleanly AND carry none of the authoring deps.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: python3 -m venv .venv && . .venv/bin/activate && pip install --upgrade pip
      - name: Install (runtime only)
        run: . .venv/bin/activate && pip install .
      - name: Import smoke - runtime surface present
        run: |
          . .venv/bin/activate
          python - <<'PY'
          import langfuse_synth_core as c
          from langfuse_synth_core.companion import CompanionAdapter  # noqa: F401
          from langfuse_synth_core.derivation import DerivationHook, identity_derivation
          # Ring 1a (#31): the byte-identical core must import on the lean runtime.
          from langfuse_synth_core import rng, pricing, distributions, lfclient, config, timegen  # noqa: F401
          from langfuse_synth_core.seed import events  # noqa: F401
          from langfuse_synth_core.live import theme, paths  # noqa: F401
          assert isinstance(c.__version__, str)
          assert identity_derivation(7, {}) == {"target_traces": 7}
          print("runtime surface OK; version", c.__version__)
          PY
      - name: Boundary - authoring absent without the extra
        run: |
          . .venv/bin/activate
          python - <<'PY'
          try:
              import langfuse_synth_core.authoring  # noqa: F401
          except ModuleNotFoundError:
              print("OK - authoring correctly unavailable on a runtime-only install")
          else:
              raise SystemExit("FAIL - authoring imported without the [authoring] extra")
          PY

  authoring-suite:
    # With the extra present, the authoring subpackage imports and the suite runs.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: python3 -m venv .venv && . .venv/bin/activate && pip install --upgrade pip
      - name: Install (authoring + dev)
        run: . .venv/bin/activate && pip install -e '.[authoring,dev]'
      - name: Import smoke - authoring available with the extra
        run: |
          . .venv/bin/activate
          python - <<'PY'
          import langfuse_synth_core.authoring  # noqa: F401
          print("authoring available OK")
          PY
      - name: Pytest
        run: . .venv/bin/activate && pytest
