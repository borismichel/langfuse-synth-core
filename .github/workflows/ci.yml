# CI for langfuse-synth-core.
#
# Runner policy (refines the portal's "no third-party infra touches secrets" directive):
# these jobs touch NO secrets — they are lint + import smoke only. So they run on a
# PINNED GitHub-hosted image (ubuntu-24.04, never the moving `ubuntu-latest`), which
# keeps CI reproducible without waiting on a self-hosted runner. The directive still
# binds anything that DOES touch secrets or the private registry: the private-install /
# build-secret path (docs/INSTALL.md) is exercised by the kits' own builds, and the
# secret-touching image-build jobs added in Ring 1/2 MUST run on [self-hosted, linux,
# demo-depot]. Do not route a secret-bearing job onto a hosted runner.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: python3 -m venv .venv && . .venv/bin/activate && pip install --upgrade pip
      - name: Install (dev)
        run: . .venv/bin/activate && pip install -e '.[dev]'
      - name: Ruff
        run: . .venv/bin/activate && ruff check .

  runtime-smoke:
    # A BARE runtime install must import cleanly AND carry none of the authoring deps.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: python3 -m venv .venv && . .venv/bin/activate && pip install --upgrade pip
      - name: Install (runtime only)
        run: . .venv/bin/activate && pip install .
      - name: Import smoke — runtime surface present
        run: |
          . .venv/bin/activate
          python -c "import langfuse_synth_core as c; print('version', c.__version__)"
          python -c "from langfuse_synth_core.companion import CompanionAdapter"
          python -c "from langfuse_synth_core.derivation import DerivationHook, identity_derivation; assert identity_derivation(7, {}) == {'target_traces': 7}"
      - name: Boundary — authoring absent without the extra
        run: |
          . .venv/bin/activate
          python - <<'PY'
          try:
              import langfuse_synth_core.authoring  # noqa: F401
          except ModuleNotFoundError:
              print("OK: authoring correctly unavailable on a runtime-only install")
          else:
              raise SystemExit("FAIL: authoring imported without the [authoring] extra")
          PY

  authoring-suite:
    # With the extra present, the authoring subpackage imports and the suite runs.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: python3 -m venv .venv && . .venv/bin/activate && pip install --upgrade pip
      - name: Install (authoring + dev)
        run: . .venv/bin/activate && pip install -e '.[authoring,dev]'
      - name: Import smoke — authoring available with the extra
        run: . .venv/bin/activate && python -c "import langfuse_synth_core.authoring; print('OK: authoring available')"
      - name: Pytest
        run: . .venv/bin/activate && pytest
